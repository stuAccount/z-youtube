services:
  mysql:
    image: mysql:8.4
    container_name: z-youtube-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zyoutube
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: z-youtube-redis
    ports:
      - "6379:6379"

  back:
    build:
      context: ./back
    container_name: z-youtube-back
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: zyoutube
      DB_USERNAME: root
      DB_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "6969:6969"

  front:
    build:
      context: ./front
      args:
        VITE_API_BASE_URL: ""
    container_name: z-youtube-front
    depends_on:
      - back
    ports:
      - "5173:80"

volumes:
  mysql_data:
